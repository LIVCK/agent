# golangci-lint (v2) config for livck-agent. The standard linter set stays
# strict on shipped code; errcheck is relaxed on test files and the platformtest
# fakes, where ignoring setup/teardown errors is idiomatic and adds no value.
version: "2"

run:
  timeout: 5m

linters:
  default: standard
  exclusions:
    rules:
      - path: (_test\.go$|/platformtest/)
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
