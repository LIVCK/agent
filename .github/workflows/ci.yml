name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: go.sum

      - name: Build agent (static)
        run: CGO_ENABLED=0 GOARCH=${{ matrix.goarch }} go build -trimpath ./...

      - name: Build wire module
        run: cd pkg/wire && CGO_ENABLED=0 GOARCH=${{ matrix.goarch }} go build ./...

  test:
    name: Vet, Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: go.sum

      - name: Vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12

      - name: Test (race)
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Test wire module
        run: cd pkg/wire && go test -race ./...

      # Run any fuzz targets briefly if the repo has them.
      - name: Fuzz smoke
        run: |
          if grep -rqs "func Fuzz" --include="*_test.go" .; then
            go test -run='^$' -fuzz=. -fuzztime=20s ./... || true
          else
            echo "no fuzz targets"
          fi
